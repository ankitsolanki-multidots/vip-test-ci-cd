name: CI (VIP Build and Deploy)

on:
  push:
    # REQUIRED: Prevent endless loops of deploy scripts by not building from a branch
    # name that includes a `-built` suffix.
    branches-ignore:
      - "**-built"
      - "**-built-**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # The suffix appended to the current branch name when deploying the built branch.
      # Example: pushing to `develop` creates/updates `develop-built`.
      #
      # NOTE: The VIP environment must be configured to deploy from the built branch.
      # https://docs.wpvip.com/code-deployment/default-deployment/deploying-branches/update/
      VIP_DEPLOY_SUFFIX: "-built"
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      # Uses packages from composer.json (automattic/vipwpcs, phpcompatibility/phpcompatibility-wp)
      # and rules from .phpcs.xml.dist (WordPress-VIP-Go, PHPCompatibilityWP).
      - name: Run PHPCS (VIP Coding Standards)
        run: composer run phpcs

      - name: Run PHPUnit tests
        run: composer run test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: themes/test-ci-cd/assets/.nvmrc
          cache: npm
          cache-dependency-path: themes/test-ci-cd/assets/package-lock.json

      - name: Install NPM dependencies and build theme assets
        working-directory: themes/test-ci-cd/assets
        run: npm ci && npm run build

      - name: Verify theme build output
        run: |
          test -f themes/test-ci-cd/assets/build/main.js
          test -f themes/test-ci-cd/assets/build/main.css
          test -f themes/test-ci-cd/assets/build/inline.css

      # REQUIRED: Push build artifacts to the {branch}-built branch using VIP's deploy script.
      #- name: Deploy built branch to GitHub
      #  run: |
      #    export GITHUB_AUTH_TOKEN=$(echo -n "x-access-token:${{ secrets.GITHUB_TOKEN }}" | base64 -w 0)
      #    bash <(curl -s "https://raw.githubusercontent.com/Automattic/vip-go-build/master/deploy.sh")

      - name: Deploy -built branch to github
        run: |
          export GITHUB_AUTH_TOKEN=$(echo -n "x-access-token:${GITHUB_TOKEN}" | base64 -w 0)
          export GITHUB_TOKEN=""
          ./deploy.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify that -built branch was deployed correctly
        run: ./tests/verify-gha.sh
