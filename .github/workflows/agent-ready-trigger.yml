# Fires when an issue receives the 'agent-ready' label.
# Routes to the AI agent configured in the AGENT_PROVIDER repository variable.
#
# Triggers:
#   1. issues: labeled — manual label application (or PAT-based labeling)
#   2. workflow_run — after Auto-Label Agent-Ready Issues succeeds
#      (required because GITHUB_TOKEN label adds do NOT fire issues:labeled)
#
# Supported providers:
#   cursor        → Cursor Agent CLI via CURSOR_API_KEY (default)
#   claude        → Claude Code via anthropics/claude-code-action
#   openai-codex  → OpenAI Codex CLI (stub — extend for your setup)
#   copilot       → GitHub Copilot via gh-aw (stub — extend for your setup)
#   custom        → repository_dispatch event (bring your own listener)
#
# Setup:
#   1. Set AGENT_PROVIDER in Settings → Secrets and variables → Variables
#      (optional — defaults to cursor when unset)
#   2. Add the required secret for your chosen provider:
#        cursor → CURSOR_API_KEY
#        claude → CLAUDE_CODE_OAUTH_TOKEN
#   3. Run the Setup Labels workflow once to create all labels
#
# If AGENT_PROVIDER is not set, the workflow defaults to cursor.

name: Agent-Ready Auto-Trigger

on:
  issues:
    types: [labeled]
  workflow_run:
    workflows: ["Auto-Label Agent-Ready Issues"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Resolve issue number/title/complexity from either trigger path.
  resolve-issue:
    if: |
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'agent-ready'
      ) || (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: read
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      issue_number: ${{ steps.resolve.outputs.issue_number }}
      issue_title: ${{ steps.resolve.outputs.issue_title }}
      is_high: ${{ steps.resolve.outputs.is_high }}
      provider: ${{ steps.resolve.outputs.provider }}

    steps:
      - name: Download auto-label handoff (workflow_run only)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: agent-ready-handoff
          path: agent-ready-handoff
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve issue context
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const provider = (process.env.AGENT_PROVIDER || '').trim() || 'cursor';
            core.setOutput('provider', provider);
            console.log('AGENT_PROVIDER resolved to:', provider);

            let issueNumber = null;
            let issueTitle = null;
            let labels = [];

            if (context.eventName === 'issues') {
              issueNumber = context.payload.issue.number;
              issueTitle = context.payload.issue.title;
              labels = context.payload.issue.labels.map(l => l.name);
              console.log('Triggered by manual/PAT label on issue #' + issueNumber);
            } else {
              const fs = require('fs');
              const path = 'agent-ready-handoff/payload.json';
              if (!fs.existsSync(path)) {
                throw new Error('Expected agent-ready-handoff/payload.json from Auto-Label workflow');
              }
              const payload = JSON.parse(fs.readFileSync(path, 'utf8'));
              console.log('Auto-label handoff:', payload);

              if (!payload.should_trigger) {
                console.log('Handoff says should_trigger=false (no newly applied label). Skipping.');
                core.setOutput('should_run', 'false');
                core.setOutput('issue_number', '');
                core.setOutput('issue_title', '');
                core.setOutput('is_high', 'false');
                return;
              }

              issueNumber = payload.issue_number;
              issueTitle = payload.issue_title;
              labels = payload.labels || [];
              console.log('Triggered by auto-label handoff for issue #' + issueNumber);

              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              issueTitle = issue.title;
              labels = issue.labels.map(l => l.name);
            }

            const isHigh = labels.includes('complexity:high');
            console.log('Issue labels:', labels.join(', ') || '(none)');
            console.log('complexity:high:', isHigh);

            core.setOutput('should_run', 'true');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('issue_title', issueTitle);
            core.setOutput('is_high', isHigh ? 'true' : 'false');
        env:
          AGENT_PROVIDER: ${{ vars.AGENT_PROVIDER }}

  # ─────────────────────────────────────────────────────────────────────────────
  # CURSOR (default)
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-cursor:
    needs: resolve-issue
    if: |
      needs.resolve-issue.outputs.should_run == 'true' &&
      needs.resolve-issue.outputs.provider == 'cursor'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify CURSOR_API_KEY secret
        id: verify-key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "CURSOR_API_KEY repository secret is not set (or is empty)."
            exit 1
          fi
          echo "missing=false" >> "$GITHUB_OUTPUT"
          echo "CURSOR_API_KEY is present (${#CURSOR_API_KEY} chars)."

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$HOME/.cursor/bin:$PATH"
          if ! command -v agent >/dev/null 2>&1; then
            echo "Cursor CLI install completed but 'agent' was not found on PATH."
            echo "PATH=$PATH"
            ls -la "$HOME/.local/bin" "$HOME/.cursor/bin" 2>/dev/null || true
            exit 1
          fi
          agent --version || true

      - name: Preflight Cursor auth
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_AGENT_MODEL: ${{ vars.CURSOR_AGENT_MODEL }}
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cursor/bin:$PATH"
          echo "== agent status =="
          agent status || true
          echo "== agent models (first lines) =="
          agent models 2>&1 | head -n 40 || true
          echo "== smoke prompt =="
          # Headless CI needs --trust; disable sandbox so git/gh work.
          #   Prefer a stable model via CURSOR_AGENT_MODEL if "auto" is rejected for your account.
          MODEL="${CURSOR_AGENT_MODEL:-auto}"
          agent -p --force --trust --sandbox disabled --output-format text --model "${MODEL}" \
            "Reply with exactly: cursor-ci-ok"

      - name: Run Cursor Agent — Planning Phase (complexity:high)
        id: cursor-plan
        if: needs.resolve-issue.outputs.is_high == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_AGENT_MODEL: ${{ vars.CURSOR_AGENT_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
          REPO: ${{ github.repository }}
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cursor/bin:$PATH"
          MODEL="${CURSOR_AGENT_MODEL:-auto}"
          PROMPT_FILE="$(mktemp)"
          cat > "${PROMPT_FILE}" <<EOF
          You are planning the implementation for issue #${ISSUE_NUMBER}.

          Issue title: ${ISSUE_TITLE}

          This is a complexity:high issue. Your job is to PLAN, not implement.

          Instructions:
          1. Read the full issue body:
             gh issue view ${ISSUE_NUMBER} --repo ${REPO}
          2. Read any project guidance files (CLAUDE.md, AGENTS.md, README.md) if present
          3. Read the key files referenced in Technical Notes to understand the codebase
          4. Write a structured implementation plan as a markdown file saved to:
             docs/plans/YYYY-MM-DD-NNN-<type>-<short-title>-plan.md
             The plan should include: problem frame, requirements, scope boundaries,
             key technical decisions, and implementation units (each with goal, files,
             approach, and test scenarios)
          5. Commit the plan file to a new branch named:
             plan/issue-${ISSUE_NUMBER}
             Then push the branch to origin
          6. After committing, post a comment on the issue with:
             - A link to the plan file (GitHub URL)
             - "Implementation plan is ready for review. Reply /approve-plan to begin
               implementation, or comment with feedback to revise the plan."
          7. Do NOT change any application code
          8. Do NOT open a pull request
          EOF
          agent -p --force --trust --sandbox disabled --output-format text --model "${MODEL}" \
            --workspace "${GITHUB_WORKSPACE}" "$(cat "${PROMPT_FILE}")"
          rm -f "${PROMPT_FILE}"

      - name: Run Cursor Agent — Direct Execution (complexity:low/medium)
        id: cursor-work
        if: needs.resolve-issue.outputs.is_high == 'false'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_AGENT_MODEL: ${{ vars.CURSOR_AGENT_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
          REPO: ${{ github.repository }}
        run: |
          export PATH="$HOME/.local/bin:$HOME/.cursor/bin:$PATH"
          MODEL="${CURSOR_AGENT_MODEL:-auto}"
          PROMPT_FILE="$(mktemp)"
          cat > "${PROMPT_FILE}" <<EOF
          You are implementing issue #${ISSUE_NUMBER}.

          Issue title: ${ISSUE_TITLE}

          Instructions:
          1. Read the full issue body carefully using the GitHub CLI:
             gh issue view ${ISSUE_NUMBER} --repo ${REPO}
          2. Read any project guidance files (CLAUDE.md, AGENTS.md, README.md) if present
          3. Implement the feature following the acceptance criteria exactly
          4. Stay within the defined scope — "Out of scope" is a hard boundary
          5. Follow the patterns referenced in Technical Notes (read the key files listed there)
          6. Create a branch and push your changes:
             - Branch name: agent/issue-${ISSUE_NUMBER}
             - Commit with a clear message describing the change
             - Push the branch to origin
          7. Do NOT open a pull request — a later CI step opens the PR deterministically
          8. Do NOT post a comment about being unable to open a PR

          If you are blocked or unclear on something, post a comment on the issue
          asking for clarification rather than guessing.
          EOF
          agent -p --force --trust --sandbox disabled --output-format text --model "${MODEL}" \
            --workspace "${GITHUB_WORKSPACE}" "$(cat "${PROMPT_FILE}")"
          rm -f "${PROMPT_FILE}"

      - name: Open PR for agent branch
        id: open-pr
        if: needs.resolve-issue.outputs.is_high == 'false' && success()
        env:
          # Prefer a PAT (AGENT_GITHUB_TOKEN) so PR creation works even when Actions
          # is not allowed to create PRs with GITHUB_TOKEN. Falls back to GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"

          if ! git ls-remote --exit-code --heads origin "${BRANCH}"; then
            echo "Branch ${BRANCH} was not pushed by the agent — cannot open PR"
            gh issue comment "${ISSUE_NUMBER}" --repo "${REPO}" --body \
              "⚠️ Agent finished but no branch \`${BRANCH}\` was found. Check the workflow logs."
            exit 1
          fi

          EXISTING="$(gh pr list --repo "${REPO}" --head "${BRANCH}" --state open --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}"
            PR_NUMBER="${EXISTING}"
          else
            BODY_FILE="$(mktemp)"
            TEMPLATE=".github/PULL_REQUEST_TEMPLATE/agent-generated.md"
            if [ -f "${TEMPLATE}" ]; then
              cat "${TEMPLATE}" > "${BODY_FILE}"
            else
              printf '%s\n' "Automated implementation by the Cursor agent." > "${BODY_FILE}"
            fi
            printf '\n\nCloses #%s\n' "${ISSUE_NUMBER}" >> "${BODY_FILE}"

            BASE="${DEFAULT_BRANCH:-main}"
            set +e
            PR_URL="$(gh pr create \
              --repo "${REPO}" \
              --base "${BASE}" \
              --head "${BRANCH}" \
              --title "${ISSUE_TITLE}" \
              --body-file "${BODY_FILE}" 2>&1)"
            CREATE_STATUS=$?
            set -e
            rm -f "${BODY_FILE}"

            if [ "${CREATE_STATUS}" -ne 0 ]; then
              echo "${PR_URL}"
              COMPARE_URL="https://github.com/${REPO}/compare/${BASE}...${BRANCH}?expand=1"
              COMMENT_FILE="$(mktemp)"
              {
                echo "⚠️ Agent pushed branch \`${BRANCH}\` but could not open a PR."
                echo ""
                echo '```'
                echo "${PR_URL}"
                echo '```'
                echo ""
                echo "**Fix (pick one):**"
                echo "1. Repo **Settings → Actions → General → Workflow permissions** → enable **Allow GitHub Actions to create and approve pull requests**, then re-run."
                echo "2. Or add a PAT with \`repo\` scope as secret \`AGENT_GITHUB_TOKEN\` and re-run."
                echo ""
                echo "**Open PR manually:** ${COMPARE_URL}"
              } > "${COMMENT_FILE}"
              gh issue comment "${ISSUE_NUMBER}" --repo "${REPO}" --body-file "${COMMENT_FILE}"
              rm -f "${COMMENT_FILE}"
              exit 1
            fi

            echo "Opened ${PR_URL}"
            PR_NUMBER="$(echo "${PR_URL}" | grep -oE '[0-9]+$')"
          fi

          gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "agent-generated" || true

          PR_URL="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json url --jq .url)"
          gh issue comment "${ISSUE_NUMBER}" --repo "${REPO}" --body "Implementation ready: ${PR_URL}"

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          KEY_MISSING: ${{ steps.verify-key.outputs.missing }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const keyMissing = process.env.KEY_MISSING === 'true';
            const runUrl = process.env.RUN_URL;

            const body = keyMissing
              ? [
                  '⚠️ **Agent setup incomplete**',
                  '',
                  'The `CURSOR_API_KEY` repository secret is missing or empty.',
                  '',
                  'To fix:',
                  '1. Generate a key at [Cursor Dashboard → API Keys](https://cursor.com/dashboard?tab=integrations)',
                  '2. Add it under **Settings → Secrets and variables → Actions** as `CURSOR_API_KEY`',
                  '3. Re-run the failed workflow (or remove and re-add the `agent-ready` label)',
                  '',
                  `Logs: ${runUrl}`
                ].join('\n')
              : [
                  '⚠️ **Cursor agent workflow failed**',
                  '',
                  '`CURSOR_API_KEY` is present, so this is likely a CLI/auth/runtime error — not a missing secret.',
                  '',
                  'Check the Actions log for the failed step (Install / Agent / Open PR).',
                  `Logs: ${runUrl}`,
                  '',
                  'Common causes:',
                  '- Invalid/expired Cursor API key',
                  '- Agent CLI could not authenticate',
                  '- Agent did not push `agent/issue-N`',
                  '- PR create permissions / branch protection'
                ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # CLAUDE
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-claude:
    needs: resolve-issue
    if: |
      needs.resolve-issue.outputs.should_run == 'true' &&
      needs.resolve-issue.outputs.provider == 'claude'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Code — Planning Phase (complexity:high)
        id: claude-plan
        if: needs.resolve-issue.outputs.is_high == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "defaultMode": "acceptEdits",
                "allow": [
                  "Bash(git *)",
                  "Bash(gh *)"
                ]
              }
            }
          additional_permissions: |
            actions: read
          prompt: |
            You are planning the implementation for issue #${{ needs.resolve-issue.outputs.issue_number }}.

            Issue title: ${{ needs.resolve-issue.outputs.issue_title }}

            This is a complexity:high issue. Your job is to PLAN, not implement.

            Instructions:
            1. Read the full issue body:
               gh issue view ${{ needs.resolve-issue.outputs.issue_number }} --repo ${{ github.repository }}
            2. Read CLAUDE.md for project-specific guidance
            3. Read the key files referenced in Technical Notes to understand the codebase
            4. Write a structured implementation plan as a markdown file saved to:
               docs/plans/YYYY-MM-DD-NNN-<type>-<short-title>-plan.md
               The plan should include: problem frame, requirements, scope boundaries,
               key technical decisions, and implementation units (each with goal, files,
               approach, and test scenarios)
            5. Commit the plan file to a new branch named:
               plan/issue-${{ needs.resolve-issue.outputs.issue_number }}
            6. After committing, post a comment on the issue with:
               - A link to the plan file (GitHub URL)
               - "Implementation plan is ready for review. Reply /approve-plan to begin
                 implementation, or comment with feedback to revise the plan."
            7. Do NOT change any application code
            8. Do NOT open a pull request

      - name: Run Claude Code — Direct Execution (complexity:low/medium)
        id: claude-work
        if: needs.resolve-issue.outputs.is_high == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "defaultMode": "acceptEdits",
                "allow": [
                  "Bash(git *)",
                  "Bash(gh *)"
                ]
              }
            }
          additional_permissions: |
            actions: read
          prompt: |
            You are implementing issue #${{ needs.resolve-issue.outputs.issue_number }}.

            Issue title: ${{ needs.resolve-issue.outputs.issue_title }}

            Instructions:
            1. Read the full issue body carefully using the GitHub CLI:
               gh issue view ${{ needs.resolve-issue.outputs.issue_number }} --repo ${{ github.repository }}
            2. Read CLAUDE.md for project-specific guidance
            3. Implement the feature following the acceptance criteria exactly
            4. Stay within the defined scope — "Out of scope" is a hard boundary
            5. Follow the patterns referenced in Technical Notes (read the key files listed there)
            6. Create a branch, commit your changes, and open a PR:
               - Branch name: agent/issue-${{ needs.resolve-issue.outputs.issue_number }}
               - PR title should match the issue title
               - PR body: reference "Closes #${{ needs.resolve-issue.outputs.issue_number }}" and summarize what you did
               - Use the template at .github/PULL_REQUEST_TEMPLATE/agent-generated.md if it exists
            7. Add the 'agent-generated' label to the PR
            8. After the PR is open, update the original issue's acceptance criteria:
               - Check off any criteria your implementation directly satisfies
               - Leave unchecked anything that requires manual testing, human review, or CI
               - Use gh issue edit to update the checkbox state in the issue body

            If you are blocked or unclear on something, post a comment on the issue
            asking for clarification rather than guessing.

      - name: Check for missing CLAUDE_CODE_OAUTH_TOKEN
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: [
                '⚠️ **Agent setup incomplete**',
                '',
                'The Claude Code workflow failed. This is usually caused by a missing `CLAUDE_CODE_OAUTH_TOKEN` secret.',
                '',
                'To fix: go to **Settings → Secrets and variables → Secrets** and add `CLAUDE_CODE_OAUTH_TOKEN`.'
              ].join('\n')
            });
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}

  # ─────────────────────────────────────────────────────────────────────────────
  # OPENAI CODEX (stub)
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-openai-codex:
    needs: resolve-issue
    if: |
      needs.resolve-issue.outputs.should_run == 'true' &&
      needs.resolve-issue.outputs.provider == 'openai-codex'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
        run: |
          echo "OpenAI Codex provider stub — configure this step for your setup"
          echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"

  # ─────────────────────────────────────────────────────────────────────────────
  # GITHUB COPILOT via gh-aw (stub)
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-copilot:
    needs: resolve-issue
    if: |
      needs.resolve-issue.outputs.should_run == 'true' &&
      needs.resolve-issue.outputs.provider == 'copilot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Copilot via gh-aw
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
        run: |
          echo "GitHub Copilot (gh-aw) provider stub — configure this step for your setup"
          echo "Issue #${ISSUE_NUMBER}"

  # ─────────────────────────────────────────────────────────────────────────────
  # CUSTOM — repository_dispatch
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-custom:
    needs: resolve-issue
    if: |
      needs.resolve-issue.outputs.should_run == 'true' &&
      needs.resolve-issue.outputs.provider == 'custom'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Dispatch agent-ready event
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.resolve-issue.outputs.issue_title }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'agent-ready',
              client_payload: {
                issue_number: issue.number,
                issue_title: issue.title,
                issue_body: issue.body,
                issue_url: issue.html_url,
                labels: issue.labels.map(l => l.name)
              }
            });
            console.log(`Dispatched agent-ready event for issue #${issue.number}`);
