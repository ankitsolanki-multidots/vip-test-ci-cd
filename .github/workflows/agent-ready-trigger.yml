# Fires when an issue receives the 'agent-ready' label.
# Routes to the AI agent configured in the AGENT_PROVIDER repository variable.
#
# Supported providers:
#   cursor        → Cursor Agent CLI via CURSOR_API_KEY (default)
#   claude        → Claude Code via anthropics/claude-code-action
#   openai-codex  → OpenAI Codex CLI (stub — extend for your setup)
#   copilot       → GitHub Copilot via gh-aw (stub — extend for your setup)
#   custom        → repository_dispatch event (bring your own listener)
#
# Setup:
#   1. Set AGENT_PROVIDER in Settings → Secrets and variables → Variables
#      (optional — defaults to cursor when unset)
#   2. Add the required secret for your chosen provider:
#        cursor → CURSOR_API_KEY
#        claude → CLAUDE_CODE_OAUTH_TOKEN
#   3. Run the Setup Labels workflow once to create all labels
#
# If AGENT_PROVIDER is not set, the workflow defaults to cursor.

name: Agent-Ready Auto-Trigger

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CURSOR (default)
  # Uses Cursor Agent CLI with CURSOR_API_KEY for complexity-aware execution.
  #
  # complexity:high  → plan first, human approves via /approve-plan, then implement
  # complexity:low/medium (or absent) → implement directly
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-cursor:
    if: |
      github.event.label.name == 'agent-ready' &&
      (vars.AGENT_PROVIDER == 'cursor' || vars.AGENT_PROVIDER == '')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Agent needs to push branches/PRs
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine complexity
        id: complexity
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const isHigh = labels.includes('complexity:high');
            console.log('Issue labels:', labels.join(', '));
            console.log('complexity:high:', isHigh);
            core.setOutput('is_high', isHigh ? 'true' : 'false');

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      # ── HIGH COMPLEXITY: plan first, then gate on /approve-plan ──────────────
      - name: Run Cursor Agent — Planning Phase (complexity:high)
        id: cursor-plan
        if: steps.complexity.outputs.is_high == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "CURSOR_API_KEY secret is missing"
            exit 1
          fi

          agent -p --force --model composer-2 <<EOF
          You are planning the implementation for issue #${ISSUE_NUMBER}.

          Issue title: ${ISSUE_TITLE}

          This is a complexity:high issue. Your job is to PLAN, not implement.

          Instructions:
          1. Read the full issue body:
             gh issue view ${ISSUE_NUMBER} --repo ${REPO}
          2. Read any project guidance files (CLAUDE.md, AGENTS.md, README.md) if present
          3. Read the key files referenced in Technical Notes to understand the codebase
          4. Write a structured implementation plan as a markdown file saved to:
             docs/plans/YYYY-MM-DD-NNN-<type>-<short-title>-plan.md
             The plan should include: problem frame, requirements, scope boundaries,
             key technical decisions, and implementation units (each with goal, files,
             approach, and test scenarios)
          5. Commit the plan file to a new branch named:
             plan/issue-${ISSUE_NUMBER}
             Then push the branch to origin
          6. After committing, post a comment on the issue with:
             - A link to the plan file (GitHub URL)
             - "Implementation plan is ready for review. Reply /approve-plan to begin
               implementation, or comment with feedback to revise the plan."
          7. Do NOT change any application code
          8. Do NOT open a pull request
          EOF

      # ── LOW/MEDIUM COMPLEXITY: execute directly ──────────────────────────────
      - name: Run Cursor Agent — Direct Execution (complexity:low/medium)
        id: cursor-work
        if: steps.complexity.outputs.is_high == 'false'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "CURSOR_API_KEY secret is missing"
            exit 1
          fi

          agent -p --force --model composer-2 <<EOF
          You are implementing issue #${ISSUE_NUMBER}.

          Issue title: ${ISSUE_TITLE}

          Instructions:
          1. Read the full issue body carefully using the GitHub CLI:
             gh issue view ${ISSUE_NUMBER} --repo ${REPO}
          2. Read any project guidance files (CLAUDE.md, AGENTS.md, README.md) if present
          3. Implement the feature following the acceptance criteria exactly
          4. Stay within the defined scope — "Out of scope" is a hard boundary
          5. Follow the patterns referenced in Technical Notes (read the key files listed there)
          6. Create a branch, commit your changes, and open a PR:
             - Branch name: agent/issue-${ISSUE_NUMBER}
             - PR title should match the issue title
             - PR body: reference "Closes #${ISSUE_NUMBER}" and summarize what you did
             - Use the template at .github/PULL_REQUEST_TEMPLATE/agent-generated.md if it exists
          7. Add the 'agent-generated' label to the PR
          8. After the PR is open, update the original issue's acceptance criteria:
             - Check off any criteria your implementation directly satisfies
             - Leave unchecked anything that requires manual testing, human review, or CI
             - Use gh issue edit to update the checkbox state in the issue body

          If you are blocked or unclear on something, post a comment on the issue
          asking for clarification rather than guessing.
          EOF

      - name: Check for missing CURSOR_API_KEY
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                '⚠️ **Agent setup incomplete**',
                '',
                'The Cursor Agent workflow failed. This is usually caused by a missing `CURSOR_API_KEY` secret.',
                '',
                'To fix:',
                '1. Generate a key at [Cursor Dashboard → API Keys](https://cursor.com/dashboard?tab=integrations)',
                '2. Add it under **Settings → Secrets and variables → Actions** as `CURSOR_API_KEY`',
                '',
                'Optional: set repository variable `AGENT_PROVIDER` to `cursor` (this is already the default when unset).'
              ].join('\n')
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # CLAUDE
  # Uses Claude Code with Compound Engineering for complexity-aware execution.
  #
  # complexity:high  → /ce-plan first, human approves via /approve-plan, then /ce-work
  # complexity:low/medium (or absent) → /ce-work directly
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-claude:
    if: |
      github.event.label.name == 'agent-ready' &&
      vars.AGENT_PROVIDER == 'claude'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine complexity
        id: complexity
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            const isHigh = labels.includes('complexity:high');
            console.log('Issue labels:', labels.join(', '));
            console.log('complexity:high:', isHigh);
            core.setOutput('is_high', isHigh ? 'true' : 'false');

      # ── HIGH COMPLEXITY: plan first, then gate on /approve-plan ──────────────
      - name: Run Claude Code — Planning Phase (complexity:high)
        id: claude-plan
        if: steps.complexity.outputs.is_high == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "defaultMode": "acceptEdits",
                "allow": [
                  "Bash(git *)",
                  "Bash(gh *)"
                ]
              }
            }
          # Uncomment to stream the full SDK output into the job log for debugging:
          # show_full_output: true
          additional_permissions: |
            actions: read
          prompt: |
            You are planning the implementation for issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}

            This is a complexity:high issue. Your job is to PLAN, not implement.

            Instructions:
            1. Read the full issue body:
               gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }}
            2. Read CLAUDE.md for project-specific guidance
            3. Read the key files referenced in Technical Notes to understand the codebase
            4. Write a structured implementation plan as a markdown file saved to:
               docs/plans/YYYY-MM-DD-NNN-<type>-<short-title>-plan.md
               The plan should include: problem frame, requirements, scope boundaries,
               key technical decisions, and implementation units (each with goal, files,
               approach, and test scenarios)
            5. Commit the plan file to a new branch named:
               plan/issue-${{ github.event.issue.number }}
            6. After committing, post a comment on the issue with:
               - A link to the plan file (GitHub URL)
               - "Implementation plan is ready for review. Reply /approve-plan to begin
                 implementation, or comment with feedback to revise the plan."
            7. Do NOT change any application code
            8. Do NOT open a pull request

      # ── LOW/MEDIUM COMPLEXITY: execute directly ──────────────────────────────
      - name: Run Claude Code — Direct Execution (complexity:low/medium)
        id: claude-work
        if: steps.complexity.outputs.is_high == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "defaultMode": "acceptEdits",
                "allow": [
                  "Bash(git *)",
                  "Bash(gh *)"
                ]
              }
            }
          # Uncomment to stream the full SDK output into the job log for debugging:
          # show_full_output: true
          additional_permissions: |
            actions: read
          prompt: |
            You are implementing issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}

            Instructions:
            1. Read the full issue body carefully using the GitHub CLI:
               gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }}
            2. Read CLAUDE.md for project-specific guidance
            3. Implement the feature following the acceptance criteria exactly
            4. Stay within the defined scope — "Out of scope" is a hard boundary
            5. Follow the patterns referenced in Technical Notes (read the key files listed there)
            6. Create a branch, commit your changes, and open a PR:
               - Branch name: agent/issue-${{ github.event.issue.number }}
               - PR title should match the issue title
               - PR body: reference "Closes #${{ github.event.issue.number }}" and summarize what you did
               - Use the template at .github/PULL_REQUEST_TEMPLATE/agent-generated.md if it exists
            7. Add the 'agent-generated' label to the PR
            8. After the PR is open, update the original issue's acceptance criteria:
               - Check off any criteria your implementation directly satisfies
               - Leave unchecked anything that requires manual testing, human review, or CI
               - Use gh issue edit to update the checkbox state in the issue body

            If you are blocked or unclear on something, post a comment on the issue
            asking for clarification rather than guessing.

      - name: Check for missing CLAUDE_CODE_OAUTH_TOKEN
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                '⚠️ **Agent setup incomplete**',
                '',
                'The Claude Code workflow failed. This is usually caused by a missing `CLAUDE_CODE_OAUTH_TOKEN` secret.',
                '',
                'To fix: go to **Settings → Secrets and variables → Secrets** and add `CLAUDE_CODE_OAUTH_TOKEN`.',
                '',
                'See the [README](../blob/main/README.md) for setup instructions.'
              ].join('\n')
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # OPENAI CODEX (stub)
  # TODO: extend this job for your Codex setup.
  # See https://github.com/openai/codex for the CLI reference.
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-openai-codex:
    if: |
      github.event.label.name == 'agent-ready' &&
      vars.AGENT_PROVIDER == 'openai-codex'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # TODO: Replace this stub with your Codex invocation.
          # Example using the Codex CLI:
          #
          #   npm install -g @openai/codex
          #   codex --approval-mode full-auto \
          #     --model o4-mini \
          #     "Implement issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          #
          # After implementation, create a PR:
          #   git push origin HEAD
          #   gh pr create --title "..." --body "Closes #${ISSUE_NUMBER}"
          #
          echo "OpenAI Codex provider stub — configure this step for your setup"
          echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"

  # ─────────────────────────────────────────────────────────────────────────────
  # GITHUB COPILOT via gh-aw (stub)
  # TODO: extend this job for your gh-aw setup.
  # See https://github.com/github/gh-aw for the CLI reference.
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-copilot:
    if: |
      github.event.label.name == 'agent-ready' &&
      vars.AGENT_PROVIDER == 'copilot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Copilot via gh-aw
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # TODO: Replace this stub with your gh-aw invocation.
          # Prerequisites:
          #   1. Install gh-aw: gh extension install github/gh-aw
          #   2. Author a workflow markdown file (e.g., .github/workflows/implement-issue.md)
          #   3. Compile it: gh aw compile implement-issue
          #
          # Then invoke the compiled workflow:
          #   gh aw run implement-issue --issue "${ISSUE_NUMBER}"
          #
          echo "GitHub Copilot (gh-aw) provider stub — configure this step for your setup"
          echo "Issue #${ISSUE_NUMBER}"

  # ─────────────────────────────────────────────────────────────────────────────
  # CUSTOM — repository_dispatch
  # Emits an event that a listener workflow in this repo can consume.
  # Note: repository_dispatch events are NOT cross-repo. Your listener workflow
  # must be in this same repository. For outbound HTTP to an external agent,
  # replace the github-script step with a curl call.
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-custom:
    if: |
      github.event.label.name == 'agent-ready' &&
      vars.AGENT_PROVIDER == 'custom'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Dispatch agent-ready event
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'agent-ready',
              client_payload: {
                issue_number: context.payload.issue.number,
                issue_title: context.payload.issue.title,
                issue_body: context.payload.issue.body,
                issue_url: context.payload.issue.html_url,
                labels: context.payload.issue.labels.map(l => l.name)
              }
            });
            console.log(`Dispatched agent-ready event for issue #${context.payload.issue.number}`);
