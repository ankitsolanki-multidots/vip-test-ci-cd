# Listens for '/approve-plan' comments on issues and resumes implementation.
#
# This workflow is part of the complexity:high flow:
#   1. agent-ready-trigger.yml fires, agent writes a plan to docs/plans/
#   2. Agent posts a comment asking for /approve-plan
#   3. This workflow fires on that comment, verifies the commenter, then implements
#
# Provider routing (mirrors agent-ready-trigger.yml):
#   cursor (default when AGENT_PROVIDER is unset) → Cursor Agent CLI + CURSOR_API_KEY
#   claude → Claude Code + CLAUDE_CODE_OAUTH_TOKEN
#
# Only collaborators with write or admin permission can approve plans.
# Non-collaborators receive a reply comment but no agent run is started.

name: Plan Approval Gate

on:
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  handle-approve-plan:
    # Only fire on /approve-plan comments (not PR comments, not other content)
    if: |
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/approve-plan')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check commenter permissions
        id: permission-check
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            const issueNumber = context.payload.issue.number;

            let permLevel;
            try {
              const result = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter
              });
              permLevel = result.data.permission;
            } catch (err) {
              // User is not a collaborator at all
              permLevel = 'none';
            }

            const allowed = ['write', 'admin'].includes(permLevel);
            console.log(`Commenter ${commenter} has permission: ${permLevel} — allowed: ${allowed}`);

            if (!allowed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `@${commenter} Only collaborators with write access can approve plans. Your approval was not processed.`
              });
            }

            core.setOutput('allowed', allowed ? 'true' : 'false');

      - name: Check for existing PR (idempotency)
        id: pr-check
        if: steps.permission-check.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            // Check if any open PR references this issue
            const existing = prs.find(pr =>
              pr.body && (
                pr.body.includes(`Closes #${issueNumber}`) ||
                pr.body.includes(`closes #${issueNumber}`) ||
                pr.body.includes(`Fixes #${issueNumber}`) ||
                pr.body.includes(`fixes #${issueNumber}`)
              )
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Implementation is already in progress: ${existing.html_url}`
              });
              core.setOutput('already_running', 'true');
            } else {
              core.setOutput('already_running', 'false');
            }

      - name: Resolve agent provider
        id: provider
        if: |
          steps.permission-check.outputs.allowed == 'true' &&
          steps.pr-check.outputs.already_running == 'false'
        run: |
          PROVIDER="${{ vars.AGENT_PROVIDER }}"
          if [ -z "${PROVIDER}" ]; then
            PROVIDER="cursor"
          fi
          echo "provider=${PROVIDER}" >> "$GITHUB_OUTPUT"
          echo "Using agent provider: ${PROVIDER}"

      - name: Install Cursor CLI
        if: |
          steps.permission-check.outputs.allowed == 'true' &&
          steps.pr-check.outputs.already_running == 'false' &&
          steps.provider.outputs.provider == 'cursor'
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Run Cursor Agent with approved plan
        if: |
          steps.permission-check.outputs.allowed == 'true' &&
          steps.pr-check.outputs.already_running == 'false' &&
          steps.provider.outputs.provider == 'cursor'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "CURSOR_API_KEY secret is missing"
            exit 1
          fi

          agent -p --force --model composer-2 <<EOF
          You are implementing issue #${ISSUE_NUMBER}.

          Issue title: ${ISSUE_TITLE}

          A human has approved the plan for this issue. Your job is to implement it.

          Instructions:
          1. Find the plan file in docs/plans/ that corresponds to this issue
             (look for a recent plan file — check file dates and titles)
          2. If a plan file exists, follow it closely
          3. If no plan file exists, implement from the issue context:
             gh issue view ${ISSUE_NUMBER} --repo ${REPO}
          4. Implement the feature per the plan or issue
          5. Create a branch named agent/issue-${ISSUE_NUMBER}, commit, and push to origin
          6. Do NOT open a pull request — a later CI step opens the PR deterministically
          7. Do NOT post a comment about being unable to open a PR

          Important:
          - Stay within the issue's defined scope ("Out of scope" is a hard boundary)
          - If blocked or uncertain, comment on the issue asking for clarification
          EOF

      - name: Open PR for agent branch
        if: |
          steps.permission-check.outputs.allowed == 'true' &&
          steps.pr-check.outputs.already_running == 'false' &&
          steps.provider.outputs.provider == 'cursor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"

          if ! git ls-remote --exit-code --heads origin "${BRANCH}"; then
            echo "Branch ${BRANCH} was not pushed by the agent — cannot open PR"
            gh issue comment "${ISSUE_NUMBER}" --repo "${REPO}" --body \
              "⚠️ Agent finished but no branch \`${BRANCH}\` was found. Check the workflow logs."
            exit 1
          fi

          EXISTING="$(gh pr list --repo "${REPO}" --head "${BRANCH}" --state open --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}"
            PR_NUMBER="${EXISTING}"
          else
            BODY_FILE="$(mktemp)"
            TEMPLATE=".github/PULL_REQUEST_TEMPLATE/agent-generated.md"
            if [ -f "${TEMPLATE}" ]; then
              cat "${TEMPLATE}" > "${BODY_FILE}"
            else
              printf '%s\n' "Automated implementation by the Cursor agent." > "${BODY_FILE}"
            fi
            printf '\n\nCloses #%s\n' "${ISSUE_NUMBER}" >> "${BODY_FILE}"

            BASE="${DEFAULT_BRANCH:-main}"
            PR_URL="$(gh pr create \
              --repo "${REPO}" \
              --base "${BASE}" \
              --head "${BRANCH}" \
              --title "${ISSUE_TITLE}" \
              --body-file "${BODY_FILE}")"
            rm -f "${BODY_FILE}"
            echo "Opened ${PR_URL}"
            PR_NUMBER="$(echo "${PR_URL}" | grep -oE '[0-9]+$')"
          fi

          gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "agent-generated" || true
          PR_URL="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json url --jq .url)"
          gh issue comment "${ISSUE_NUMBER}" --repo "${REPO}" --body "Implementation ready: ${PR_URL}"

      - name: Run Claude Code with /ce-work
        if: |
          steps.permission-check.outputs.allowed == 'true' &&
          steps.pr-check.outputs.already_running == 'false' &&
          steps.provider.outputs.provider == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "defaultMode": "acceptEdits",
                "allow": [
                  "Bash(git *)",
                  "Bash(gh *)"
                ]
              }
            }
          # Uncomment to stream the full SDK output into the job log for debugging:
          # show_full_output: true
          prompt: |
            You are implementing issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}

            A human has approved the plan for this issue. Your job is to implement it.

            Instructions:
            1. Find the plan file in docs/plans/ that corresponds to this issue
               (look for a recent plan file — check file dates and titles)
            2. If a plan file exists, invoke /ce-work with the plan file path as input
            3. If no plan file exists, invoke /ce-work directly with the issue as context
            4. Implement the feature per the plan or issue
            5. Open a PR using the agent-generated PR template
            6. Add the 'agent-generated' label to the PR

            Important:
            - Stay within the issue's defined scope ("Out of scope" is a hard boundary)
            - Reference the issue number in the PR: "Closes #${{ github.event.issue.number }}"
            - If blocked or uncertain, comment on the issue asking for clarification

          additional_permissions: |
            actions: read
